<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字よみクイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F3E9;
  --paper-line:#DCD3BE;
  --sumi:#2A2622;
  --sumi-soft:#5C564C;
  --hanko:#B5382E;
  --hanko-deep:#8E2A22;
  --ai:#2C4A6E;
  --gold:#C79A3D;
  --correct:#3D7A55;
  --card:#FFFDF7;
  --radius:2px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--paper);
  background-image:
    linear-gradient(var(--paper-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
  background-size: 28px 28px;
  font-family:'Zen Kaku Gothic New', sans-serif;
  color:var(--sumi);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.stage{ width:100%; max-width:480px; }
.screen{ display:none; }
.screen.active{ display:block; animation:fadeUp .35s ease; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

.brand{ display:flex; align-items:baseline; gap:10px; margin-bottom:22px; }
.brand-mark{
  font-family:'Zen Maru Gothic', sans-serif; font-weight:900; font-size:15px;
  color:var(--card); background:var(--hanko);
  width:34px;height:34px; display:flex;align-items:center;justify-content:center;
  border-radius:3px; box-shadow: 2px 2px 0 var(--hanko-deep);
}
.brand-text{ font-family:'Zen Maru Gothic', sans-serif; font-weight:700; font-size:19px; letter-spacing:.04em; }
.brand-text small{ display:block; font-family:'Zen Kaku Gothic New', sans-serif; font-weight:400; font-size:11px; color:var(--sumi-soft); letter-spacing:.12em; margin-top:1px; }

.card{ background:var(--card); border:1px solid var(--paper-line); box-shadow: 4px 4px 0 rgba(42,38,34,.08); padding:28px 24px; }

.lead{ font-family:'Zen Maru Gothic', sans-serif; font-weight:700; font-size:22px; margin-bottom:6px; }
.lead-sub{ font-size:13px; color:var(--sumi-soft); margin-bottom:22px; line-height:1.7; }

.field-label{ font-size:11px; font-weight:700; letter-spacing:.1em; color:var(--sumi-soft); margin-bottom:8px; display:block; }

.name-select{
  width:100%; padding:12px 10px; margin-bottom:22px;
  border:1px solid var(--paper-line); background:var(--paper);
  font-family:'Zen Kaku Gothic New', sans-serif; font-size:15px; color:var(--sumi);
  appearance:none; -webkit-appearance:none;
  background-image: linear-gradient(45deg, transparent 50%, var(--sumi-soft) 50%), linear-gradient(135deg, var(--sumi-soft) 50%, transparent 50%);
  background-position: calc(100% - 18px) center, calc(100% - 13px) center;
  background-size: 5px 5px, 5px 5px;
  background-repeat:no-repeat;
}
.name-select:focus{ outline:none; border-color:var(--hanko); }

.grade-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.grade-btn{
  position:relative; aspect-ratio:1;
  border:1px solid var(--paper-line); background:var(--paper);
  cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  font-family:'Zen Maru Gothic', sans-serif;
}
.grade-btn .num{ font-size:26px; font-weight:900; color:var(--sumi); }
.grade-btn .lab{ font-size:10px; color:var(--sumi-soft); letter-spacing:.06em; }
.grade-btn:hover{ transform:translate(-2px,-2px); box-shadow:3px 3px 0 var(--hanko); border-color:var(--hanko); background:var(--card); }
.grade-btn:hover .num{ color:var(--hanko); }

.toggle-row{ display:flex; gap:8px; margin-bottom:20px; }
.toggle{ flex:1; padding:11px 6px; text-align:center; border:1px solid var(--paper-line); background:var(--paper); font-size:13px; font-weight:500; cursor:pointer; }
.toggle.selected{ background:var(--ai); border-color:var(--ai); color:#fff; }

.primary-btn{
  width:100%; padding:14px; background:var(--hanko); color:#fff; border:none;
  font-family:'Zen Maru Gothic', sans-serif; font-weight:700; font-size:15px; letter-spacing:.04em;
  cursor:pointer; box-shadow:3px 3px 0 var(--hanko-deep);
  transition:transform .12s ease, box-shadow .12s ease;
}
.primary-btn:hover{ transform:translate(-2px,-2px); box-shadow:5px 5px 0 var(--hanko-deep); }
.primary-btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; transform:none; }

.quiz-top{ display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--sumi-soft); margin-bottom:10px; }
.progress-track{ height:4px; background:var(--paper-line); margin-bottom:26px; }
.progress-fill{ height:100%; background:var(--hanko); width:30%; transition:width .3s ease; }

.kanji-stage{ position:relative; width:148px; margin:0 auto 22px; }
.kanji-frame{
  width:148px; height:148px; border:1.5px solid var(--sumi); position:relative;
  display:flex; align-items:center; justify-content:center; background:var(--card);
}
.kanji-frame::before,.kanji-frame::after{ content:''; position:absolute; background:var(--paper-line); }
.kanji-frame::before{ left:50%; top:0; bottom:0; width:1px; }
.kanji-frame::after{ top:50%; left:0; right:0; height:1px; }
.kanji-char{ font-family:'Zen Maru Gothic', sans-serif; font-size:88px; font-weight:500; color:var(--sumi); position:relative; z-index:1; }
.kanji-frame.wide{ width:auto; min-width:148px; height:auto; padding:22px 20px; }
.kanji-frame.wide::before,.kanji-frame.wide::after{ display:none; }
.kanji-frame.wide .kanji-char{ font-size:clamp(28px, 8vw, 56px); }

.toggle.disabled{ opacity:.35; cursor:not-allowed; pointer-events:none; }

.judge-overlay{
  position:absolute; top:50%; left:50%; width:210px; height:210px;
  transform:translate(-50%,-50%) scale(0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'Zen Maru Gothic', sans-serif; font-weight:900; font-size:150px; line-height:1;
  opacity:0; pointer-events:none; z-index:5;
  filter:drop-shadow(0 3px 0 rgba(0,0,0,.08));
}
.judge-overlay.correct{ color:var(--correct); }
.judge-overlay.wrong{ color:var(--hanko); }
.judge-overlay.show{ animation:judgePop .6s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes judgePop{
  0%{ opacity:0; transform:translate(-50%,-50%) scale(0.3) rotate(-8deg); }
  55%{ opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(3deg); }
  75%{ transform:translate(-50%,-50%) scale(0.95) rotate(0deg); }
  100%{ opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
}

.kanji-type-tag{ display:block; text-align:center; font-size:11px; letter-spacing:.15em; color:var(--ai); font-weight:700; margin-bottom:26px; }

.answer-input{
  width:100%; padding:14px; border:none; border-bottom:2px solid var(--sumi); background:transparent;
  font-family:'Zen Kaku Gothic New', sans-serif; font-size:18px; text-align:center; margin-bottom:18px; letter-spacing:.05em;
}
.answer-input:focus{ outline:none; border-color:var(--hanko); }

.choice-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px; }
.choice-btn{ padding:16px 8px; border:1px solid var(--paper-line); background:var(--paper); font-size:16px; font-family:'Zen Kaku Gothic New', sans-serif; cursor:pointer; }
.choice-btn:hover{ border-color:var(--ai); background:var(--card); }
.choice-btn.correct{ background:var(--correct); border-color:var(--correct); color:#fff; }
.choice-btn.wrong{ background:var(--hanko); border-color:var(--hanko); color:#fff; }

.feedback{ font-size:12px; color:var(--sumi-soft); text-align:center; min-height:16px; margin-bottom:10px; }

.result-score{ text-align:center; padding:14px 0 22px; }
.result-score .big{ font-family:'Zen Maru Gothic', sans-serif; font-weight:900; font-size:52px; color:var(--hanko); line-height:1; }
.result-score .of{ font-size:14px; color:var(--sumi-soft); margin-top:6px; }

.review-list{ list-style:none; border-top:1px solid var(--paper-line); margin-bottom:20px; }
.review-item{ display:flex; align-items:center; justify-content:space-between; padding:12px 4px; border-bottom:1px solid var(--paper-line); font-size:14px; }
.review-item .rk{ font-family:'Zen Maru Gothic', sans-serif; font-size:20px; width:34px; }
.review-item .ra{ color:var(--sumi-soft); font-size:12px; }
.review-item .rr{ color:var(--correct); font-weight:700; }

.btn-row{ display:flex; gap:10px; }
.btn-row .primary-btn{ flex:1; }
.ghost-btn{ flex:1; padding:14px; background:transparent; border:1px solid var(--sumi); font-family:'Zen Maru Gothic', sans-serif; font-weight:700; font-size:14px; cursor:pointer; }
</style>
</head>
<body>
<div class="stage">
  <div class="brand">
    <div class="brand-mark">読</div>
    <div class="brand-text">かんじよみクイズ<small>KANJI READING DRILL</small></div>
  </div>

  <!-- SCREEN 1: 学年・モード選択 -->
  <section id="screen-select" class="screen active">
    <div class="card">
      <div class="lead">学年をえらんでね</div>
      <div class="lead-sub">1〜6年生の漢字から出題します。まず学年、つぎに出題方法をえらんでください。</div>

      <span class="field-label">なまえ</span>
      <select id="name-select" class="name-select">
        <option value="はると" selected>はると</option>
        <option value="ゆうき">ゆうき</option>
      </select>

      <span class="field-label">GRADE</span>
      <div class="grade-grid">
        <button class="grade-btn" data-grade="1"><span class="num">1</span><span class="lab">年生</span></button>
        <button class="grade-btn" data-grade="2"><span class="num">2</span><span class="lab">年生</span></button>
        <button class="grade-btn" data-grade="3"><span class="num">3</span><span class="lab">年生</span></button>
        <button class="grade-btn" data-grade="4"><span class="num">4</span><span class="lab">年生</span></button>
        <button class="grade-btn" data-grade="5"><span class="num">5</span><span class="lab">年生</span></button>
        <button class="grade-btn" data-grade="6"><span class="num">6</span><span class="lab">年生</span></button>
      </div>

      <span class="field-label">DIRECTION</span>
      <div class="toggle-row">
        <div class="toggle selected" data-direction="kanji2yomi">漢字 → よみ</div>
        <div class="toggle" data-direction="yomi2kanji">よみ → 漢字</div>
      </div>

      <span class="field-label">MODE</span>
      <div class="toggle-row">
        <div class="toggle selected" data-mode="input">自由入力</div>
        <div class="toggle" data-mode="choice">4択</div>
      </div>

      <span class="field-label">COUNT</span>
      <div class="toggle-row">
        <div class="toggle selected" data-count="10">10問</div>
        <div class="toggle" data-count="20">20問</div>
        <div class="toggle" data-count="30">30問</div>
        <div class="toggle" data-count="all">全問</div>
      </div>

      <button class="primary-btn" id="start-btn" disabled>クイズをはじめる</button>
    </div>
  </section>

  <!-- SCREEN 2: クイズ -->
  <section id="screen-quiz" class="screen">
    <div class="card">
      <div class="quiz-top">
        <span id="q-grade-label">3年生</span>
        <span id="q-counter">3 / 10</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:30%"></div></div>

      <div class="kanji-stage">
        <div class="kanji-frame"><span class="kanji-char" id="kanji-char">早</span></div>
        <div class="judge-overlay" id="judge-overlay"></div>
      </div>
      <span class="kanji-type-tag" id="kanji-hint">よみがなを入力</span>

      <div id="mode-input-area">
        <input type="text" class="answer-input" id="answer-input" placeholder="ひらがなで こたえてね">
      </div>
      <div id="mode-choice-area" style="display:none;" class="choice-grid"></div>

      <div class="feedback" id="feedback"></div>
      <button class="primary-btn" id="next-btn">こたえる</button>
    </div>
  </section>

  <!-- SCREEN 3: 結果 -->
  <section id="screen-result" class="screen">
    <div class="card">
      <div class="result-score">
        <div class="big">8<span style="font-size:22px;color:var(--sumi-soft);">/10</span></div>
        <div class="of">正解率 80% ・ 3年生 ・ 自由入力</div>
      </div>

      <span class="field-label">まちがえた問題</span>
      <ul class="review-list"></ul>

      <div class="btn-row">
        <button class="ghost-btn" id="retry-wrong-btn">まちがいだけ復習</button>
        <button class="primary-btn" id="back-btn">学年選択へ</button>
      </div>
    </div>
  </section>
</div>

<script>
// =========================================================
// 設定
// =========================================================
const BASE_URL = 'https://yossyleaf-cmd.github.io/my-apps/kanji-quiz/';
const LOG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxC7KcDilmmICkvjCO_Lxl1Jt1SdGNervFPLvgoDdLZ12tKRncwkccgO34wj4O4cj2whw/exec';

// =========================================================
// 画面遷移
// =========================================================
const screens = {
  select: document.getElementById('screen-select'),
  quiz: document.getElementById('screen-quiz'),
  result: document.getElementById('screen-result'),
};
function show(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

// =========================================================
// データ取得・キャッシュ
// =========================================================
const gradeCache = {}; // { 1: [questions...], 2: [...] , ... }

async function fetchGrade(n){
  if (gradeCache[n]) return gradeCache[n];
  const url = `${BASE_URL}grade${n}.json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTPエラー ${res.status} : ${url}`);
  let json;
  try{
    json = await res.json();
  }catch(parseErr){
    throw new Error(`JSONの形式が正しくありません(${url}): ${parseErr.message}`);
  }
  gradeCache[n] = json.questions;
  return json.questions;
}

// 選択学年 + それ以下の学年をまとめて取得(4択ダミー用プール)。
// まだ存在しない学年ファイルはここでは無視してよいので、個別にtry/catchする。
async function fetchUpToGrade(grade){
  const grades = [];
  for (let g = 1; g <= grade; g++) grades.push(g);
  const results = await Promise.all(grades.map(async g => {
    try{ return await fetchGrade(g); }
    catch(e){ console.warn(`grade${g}スキップ:`, e.message); return []; }
  }));
  return results.flat();
}

// =========================================================
// グループ化(同じ漢字の音訓エントリを1問にまとめる)
// =========================================================
function groupByKanji(questions){
  const map = new Map();
  questions.forEach(q => {
    if (!map.has(q.kanji)) map.set(q.kanji, { kanji: q.kanji, readings: [] });
    map.get(q.kanji).readings.push({ reading: q.reading, type: q.type, alt: q.alt || [] });
  });
  return Array.from(map.values());
}

// 正解判定:音訓どちらか1つでも reading か alt に一致すればOK
function isCorrect(userInput, group){
  const normalized = (userInput || '').trim();
  if (!normalized) return false;
  return group.readings.some(r => r.reading === normalized || r.alt.includes(normalized));
}

// その漢字グループの「正解として表示していい読み」を1つ選ぶ(4択の正解ラベル用)
function pickDisplayReading(group){
  const pick = group.readings[Math.floor(Math.random() * group.readings.length)];
  return pick.reading;
}

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 4択ダミー生成:選択中の学年以下のプールから、正解漢字以外の読みをランダムに3つ
function generateChoices(correctGroup, correctReading, poolGroups){
  const others = poolGroups.filter(g => g.kanji !== correctGroup.kanji);
  const candidateReadings = shuffle(others.map(g => pickDisplayReading(g)))
    .filter((r, idx, self) => r !== correctReading && self.indexOf(r) === idx)
    .slice(0, 3);
  return shuffle([correctReading, ...candidateReadings]);
}

// 4択ダミー生成(逆方向:よみ→漢字):正解漢字以外の漢字をランダムに3つ
function generateChoicesReverse(correctGroup, poolGroups){
  const others = poolGroups.filter(g => g.kanji !== correctGroup.kanji);
  const candidateKanji = shuffle(others.map(g => g.kanji))
    .filter((k, idx, self) => self.indexOf(k) === idx)
    .slice(0, 3);
  return shuffle([correctGroup.kanji, ...candidateKanji]);
}

// =========================================================
// ログ送信(Google Apps Script経由でquiz-logsスプレッドシートへ)
// 送信に失敗してもクイズ自体は問題なく続けられるよう、エラーは握りつぶして console にのみ残す
// =========================================================
async function sendLog(payload){
  try{
    const res = await fetch(LOG_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // preflight回避のためtext/plainで送る
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => null);
    console.log('ログ送信結果:', data);
  }catch(err){
    console.warn('ログ送信に失敗しました(通信環境などの可能性):', err);
  }
}

// =========================================================
// クイズの状態
// =========================================================
let state = {
  grade: null,
  name: 'はると', // なまえ選択(デフォルト:はると)
  direction: 'kanji2yomi', // 'kanji2yomi'(漢字→よみ) | 'yomi2kanji'(よみ→漢字)
  mode: 'input', // 'input' | 'choice'
  questionCount: '10', // '10' | '20' | '30' | 'all'
  pool: [],       // 選択学年のグループ済みリスト(出題対象)
  dummyPool: [],  // 選択学年以下のグループ済みリスト(4択ダミー用)
  quizItems: [],  // 今回出題する分(シャッフル済み)
  index: 0,
  score: 0,
  wrong: [],      // [{kanji, correctReading}]
};

// =========================================================
// 画面1: 学年・モード選択
// =========================================================
document.getElementById('name-select').addEventListener('change', (e)=>{
  state.name = e.target.value;
});

document.querySelectorAll('.grade-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.grade = Number(btn.dataset.grade);
    document.querySelectorAll('.grade-btn').forEach(b=>{
      b.style.borderColor = b===btn ? 'var(--hanko)' : 'var(--paper-line)';
      b.style.boxShadow = b===btn ? '3px 3px 0 var(--hanko)' : 'none';
    });
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = 'クイズをはじめる';
    document.getElementById('q-grade-label').textContent = state.grade + '年生';
  });
});

document.querySelectorAll('[data-direction]').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('[data-direction]').forEach(x=>x.classList.remove('selected'));
    t.classList.add('selected');
    state.direction = t.dataset.direction;

    const inputToggle = document.querySelector('[data-mode="input"]');
    const choiceToggle = document.querySelector('[data-mode="choice"]');
    if (state.direction === 'yomi2kanji'){
      // よみ→漢字はIMEの変換候補で答えが見えてしまうため、自由入力を無効化して4択に固定する
      inputToggle.classList.add('disabled');
      document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('selected'));
      choiceToggle.classList.add('selected');
      state.mode = 'choice';
    } else {
      inputToggle.classList.remove('disabled');
    }
  });
});

document.querySelectorAll('[data-mode]').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('selected'));
    t.classList.add('selected');
    state.mode = t.dataset.mode;
  });
});

document.querySelectorAll('[data-count]').forEach(t=>{
  t.addEventListener('click', ()=>{
    document.querySelectorAll('[data-count]').forEach(x=>x.classList.remove('selected'));
    t.classList.add('selected');
    state.questionCount = t.dataset.count; // '10' | '20' | '30' | 'all'
  });
});

document.getElementById('start-btn').addEventListener('click', async ()=>{
  if (!state.grade) return;
  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = true;
  startBtn.textContent = '読み込み中…';

  let gradeQuestions, dummySourceQuestions;
  try{
    gradeQuestions = await fetchGrade(state.grade);
    dummySourceQuestions = await fetchUpToGrade(state.grade);
  }catch(err){
    alert(`データの読み込みに失敗しました。\n\n【エラー内容】\n${err.message}`);
    startBtn.disabled = false;
    startBtn.textContent = 'クイズをはじめる';
    return;
  }
  if (!gradeQuestions || gradeQuestions.length === 0){
    alert(`${state.grade}年生のデータ(grade${state.grade}.json)が空、または見つかりませんでした。`);
    startBtn.disabled = false;
    startBtn.textContent = 'クイズをはじめる';
    return;
  }

  state.pool = groupByKanji(gradeQuestions);
  state.dummyPool = groupByKanji(dummySourceQuestions);
  if (state.direction === 'yomi2kanji') state.mode = 'choice'; // 念のための安全策
  const requestedCount = state.questionCount === 'all'
    ? state.pool.length
    : Number(state.questionCount);
  state.quizItems = shuffle(state.pool).slice(0, Math.min(requestedCount, state.pool.length));
  state.index = 0;
  state.score = 0;
  state.wrong = [];

  startBtn.disabled = false;
  startBtn.textContent = 'クイズをはじめる';
  renderQuestion();
  show('quiz');
});

// =========================================================
// 画面2: クイズ
// =========================================================
function currentGroup(){ return state.quizItems[state.index]; }

function renderQuestion(){
  const group = currentGroup();
  const direction = state.direction;
  const frame = document.querySelector('.kanji-frame');
  const charEl = document.getElementById('kanji-char');

  document.getElementById('q-counter').textContent = `${state.index + 1} / ${state.quizItems.length}`;
  document.getElementById('progress-fill').style.width =
    `${Math.round((state.index) / state.quizItems.length * 100)}%`;
  document.getElementById('feedback').textContent = '';

  const overlay = document.getElementById('judge-overlay');
  overlay.classList.remove('show','correct','wrong');
  overlay.textContent = '';

  // よみ→漢字はIMEでの答え漏れを避けるため常に4択(renderQuestion呼び出し前にstate.modeは'choice'に強制済み)
  const isChoice = state.mode === 'choice';
  document.getElementById('mode-input-area').style.display = isChoice ? 'none' : 'block';
  document.getElementById('mode-choice-area').style.display = isChoice ? 'grid' : 'none';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = isChoice ? '次の問題へ' : 'こたえる';
  nextBtn.disabled = isChoice; // 4択は選んだ時点で判定するので、最初は押せない状態

  if (direction === 'yomi2kanji'){
    // 出題:よみ(ひらがな) → 選択肢:漢字
    const questionReading = pickDisplayReading(group);
    charEl.textContent = questionReading;
    frame.classList.add('wide');
    document.getElementById('kanji-hint').textContent = '正しい漢字を選んでね';

    const choices = generateChoicesReverse(group, state.dummyPool);
    const choiceArea = document.getElementById('mode-choice-area');
    choiceArea.innerHTML = '';
    choices.forEach(kanjiChar => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = kanjiChar;
      btn.addEventListener('click', () => handleChoiceAnswerReverse(btn, kanjiChar, group));
      choiceArea.appendChild(btn);
    });
    return;
  }

  // 通常方向:漢字 → よみ
  charEl.textContent = group.kanji;
  frame.classList.remove('wide');
  document.getElementById('kanji-hint').textContent = isChoice ? '正しいよみを選んでね' : 'よみがなを入力';

  if (isChoice){
    const correctReading = pickDisplayReading(group);
    const choices = generateChoices(group, correctReading, state.dummyPool);
    const choiceArea = document.getElementById('mode-choice-area');
    choiceArea.innerHTML = '';
    choices.forEach(reading => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = reading;
      btn.addEventListener('click', () => handleChoiceAnswer(btn, reading, group));
      choiceArea.appendChild(btn);
    });
  } else {
    const input = document.getElementById('answer-input');
    input.value = '';
    input.disabled = false;
    input.focus();
  }
}

function handleChoiceAnswer(btn, reading, group){
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    b.classList.remove('correct','wrong');
  });
  const correct = isCorrect(reading, group);
  btn.classList.add(correct ? 'correct' : 'wrong');
  judge(correct, group);
  document.getElementById('next-btn').disabled = false;
}

function handleChoiceAnswerReverse(btn, kanjiChar, group){
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    b.classList.remove('correct','wrong');
  });
  const correct = kanjiChar === group.kanji;
  btn.classList.add(correct ? 'correct' : 'wrong');
  judge(correct, group, group.kanji); // 不正解時の「こたえ」表示は漢字そのものにする
  document.getElementById('next-btn').disabled = false;
}

function handleInputAnswer(){
  const input = document.getElementById('answer-input');
  const group = currentGroup();
  const correct = isCorrect(input.value, group);
  input.disabled = true;
  judge(correct, group);
}

function judge(correct, group, answerLabelOverride){
  const feedback = document.getElementById('feedback');
  const overlay = document.getElementById('judge-overlay');
  overlay.classList.remove('show','correct','wrong');
  void overlay.offsetWidth; // reflowを挟んでアニメーションを確実に再生させる

  if (correct){
    state.score++;
    overlay.textContent = '○';
    overlay.classList.add('correct','show');
    feedback.textContent = 'せいかい!';
    feedback.style.color = 'var(--correct)';
  } else {
    const shownAnswer = answerLabelOverride !== undefined ? answerLabelOverride : group.readings[0].reading;
    state.wrong.push({ kanji: group.kanji, correctReading: shownAnswer });
    overlay.textContent = '✕';
    overlay.classList.add('wrong','show');
    feedback.textContent = `こたえ:${shownAnswer}`;
    feedback.style.color = 'var(--hanko)';
  }
}

document.getElementById('next-btn').addEventListener('click', ()=>{
  const input = document.getElementById('answer-input');
  if (state.mode === 'input' && !input.disabled){
    handleInputAnswer();
    document.getElementById('next-btn').textContent = '次の問題へ';
    return;
  }
  state.index++;
  if (state.index >= state.quizItems.length){
    renderResult();
    show('result');
  } else {
    renderQuestion();
  }
});

// =========================================================
// 画面3: 結果
// =========================================================
function renderResult(){
  const total = state.quizItems.length;
  const score = state.score;
  const rate = Math.round((score / total) * 100);

  document.querySelector('.result-score .big').innerHTML =
    `${score}<span style="font-size:22px;color:var(--sumi-soft);">/${total}</span>`;
  const directionLabel = state.direction === 'yomi2kanji' ? 'よみ→漢字' : '漢字→よみ';
  document.querySelector('.result-score .of').textContent =
    `正解率 ${rate}% ・ ${state.grade}年生 ・ ${directionLabel} ・ ${state.mode === 'input' ? '自由入力' : '4択'}`;

  const list = document.querySelector('.review-list');
  list.innerHTML = '';
  if (state.wrong.length === 0){
    const li = document.createElement('li');
    li.className = 'review-item';
    li.innerHTML = `<span style="color:var(--sumi-soft);font-size:13px;">まちがいはありませんでした!</span>`;
    list.appendChild(li);
  } else {
    state.wrong.forEach(w => {
      const li = document.createElement('li');
      li.className = 'review-item';
      li.innerHTML = `<span class="rk">${w.kanji}</span><span class="ra">こたえ: ${w.correctReading}</span><span class="rr">✕</span>`;
      list.appendChild(li);
    });
  }

  document.getElementById('retry-wrong-btn').disabled = state.wrong.length === 0;
  document.getElementById('retry-wrong-btn').style.opacity = state.wrong.length === 0 ? .4 : 1;

  sendLog({
    app: 'kanji',
    name: state.name,
    grade: state.grade,
    direction: directionLabel,
    mode: state.mode === 'input' ? '自由入力' : '4択',
    score: score,
    total: total,
    rate: rate,
    wrongWords: state.wrong // [{kanji, correctReading}]
  });
}

document.getElementById('back-btn').addEventListener('click', ()=> show('select'));

document.getElementById('retry-wrong-btn').addEventListener('click', ()=>{
  if (state.wrong.length === 0) return;
  const wrongKanjiSet = new Set(state.wrong.map(w => w.kanji));
  state.quizItems = shuffle(state.pool.filter(g => wrongKanjiSet.has(g.kanji)));
  state.index = 0;
  state.score = 0;
  state.wrong = [];
  renderQuestion();
  show('quiz');
});
</script>
</body>
</html>
